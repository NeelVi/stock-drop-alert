<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stock Drop Alerts</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0b1220" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" href="icon.png" />
  <style>
    :root { --bg:#0b1220; --card:#111827; --card2:#0e1626; --muted:#94a3b8;
            --line:#1f2937; --red:#ef4444; --green:#22c55e; --blue:#2563eb;
            --violet:#7c3aed; --amber:#f59e0b; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           max-width: 620px; margin: 0 auto; padding: 14px 14px 60px;
           background: var(--bg); color: #e5e7eb; }

    /* Header — compact, notifications is just a bell */
    .topbar { display: flex; align-items: center; gap: 10px; }
    .topbar h1 { font-size: 1.2rem; margin: 0; flex: 1; }
    .bell { font-size: 1rem; padding: 8px 12px; border: 1px solid var(--line);
            border-radius: 999px; background: var(--card); color: #e5e7eb;
            cursor: pointer; white-space: nowrap; }
    .bell.on { background: #06281a; border-color: #14532d; color: #86efac; }
    .status-line { font-size: .8rem; color: var(--muted); margin: 6px 2px 0; min-height: 1em; }
    .status-line.err { color: #fca5a5; }
    .status-line.ok  { color: #86efac; }

    /* Collapsible add form */
    .add-toggle { width: 100%; margin: 14px 0 0; padding: 11px; border: 1px dashed var(--line);
                  border-radius: 10px; background: transparent; color: #cbd5e1;
                  font-size: .95rem; cursor: pointer; }
    .add-toggle:hover { background: var(--card2); }
    .add-form { border: 1px solid var(--line); border-radius: 10px; padding: 12px;
                margin-top: 8px; background: var(--card); }
    .row { display: flex; gap: 8px; align-items: end; }
    .row .grow { flex: 1; }
    .row .w-th { width: 84px; }
    label { font-size: .72rem; color: var(--muted); display: block; margin: 0 0 3px; }
    input { font-size: .95rem; padding: 9px 10px; border-radius: 9px; border: 1px solid var(--line);
            background: #0b1220; color: #e5e7eb; width: 100%; }
    button.primary { font-size: .95rem; padding: 10px 16px; border: 0; border-radius: 9px;
                     background: var(--blue); color: #fff; cursor: pointer; font-weight: 600; }
    .hint { font-size: .76rem; color: var(--muted); margin-top: 8px; }
    code { background: #0b1220; border: 1px solid var(--line); padding: 1px 5px; border-radius: 5px; }

    /* Watchlist */
    h2 { font-size: .78rem; color: var(--muted); text-transform: uppercase;
         letter-spacing: .06em; margin: 22px 2px 8px; }
    .controls { display: flex; gap: 8px; margin-bottom: 10px; }
    .controls .search { flex: 1; }
    .controls select { border: 1px solid var(--line); background: #0b1220; color: #e5e7eb;
                       border-radius: 9px; padding: 0 8px; font-size: .82rem; max-width: 46%; }
    .item.dragging { opacity: .6; }
    .sortable-ghost { opacity: .3; }
    ul { list-style: none; padding: 0; margin: 0; }
    .item { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 10px;
            background: var(--card); overflow: hidden; border-left-width: 3px; }
    .item.up   { border-left-color: var(--green); }
    .item.down { border-left-color: var(--red); }
    .item.flat { border-left-color: var(--muted); }
    .head { display: flex; align-items: center; gap: 10px; padding: 12px; cursor: pointer; }
    .head:hover { background: var(--card2); }
    .chev { color: var(--muted); transition: transform .15s; font-size: .8rem; width: 12px; }
    .item.open .chev { transform: rotate(90deg); }
    .idcol { flex: 1; min-width: 0; }
    .sym { font-weight: 700; }
    .sub { font-size: .76rem; color: var(--muted); }
    .pricecol { text-align: right; white-space: nowrap; }
    .px { font-weight: 600; }
    .chg { font-size: .8rem; }
    .pct-up { color: var(--green); } .pct-down { color: var(--red); }

    .meta { display: flex; align-items: center; gap: 8px; padding: 0 12px 12px;
            border-top: 1px solid var(--line); padding-top: 10px; }
    .athi { font-size: .8rem; flex: 1; }
    .athi.high { color: var(--amber); }
    .athi.down { color: var(--red); font-weight: 600; }
    .athi.muted { color: var(--muted); }
    .ctrls { display: flex; align-items: center; gap: 6px; }
    .ctrls input { width: 66px; text-align: right; padding: 6px 8px; }
    .ctrls .unit { font-size: .72rem; color: var(--muted); }
    .del { background: transparent; color: var(--red); border: 1px solid var(--line);
           border-radius: 8px; padding: 6px 9px; cursor: pointer; }

    .detail { padding: 4px 12px 14px; }
    .spark { width: 100%; height: 90px; display: block; }
    .range { display: flex; justify-content: space-between; font-size: .7rem; color: var(--muted); }
    .stats { display: flex; gap: 18px; margin-top: 10px; font-size: .82rem; flex-wrap: wrap; }
    .stats b { color: #e5e7eb; }
    .alerts { display: flex; gap: 16px; margin-top: 14px; padding-top: 12px;
              border-top: 1px solid var(--line); flex-wrap: wrap; }
    .alerts label { font-size: .72rem; color: var(--muted); display: flex;
                    flex-direction: column; gap: 4px; }
    .alerts input { width: 90px; }
    .alerts .strong-lbl { color: var(--red); }
    .empty { color: var(--muted); padding: 16px 4px; text-align: center; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>📉 Drop Alerts</h1>
    <button id="enable" class="bell" title="Enable push notifications on this device">🔔 Enable</button>
  </div>
  <div id="status" class="status-line"></div>

  <button id="addToggle" class="add-toggle">＋ Add a stock / fund</button>
  <div id="addForm" class="add-form" hidden>
    <div class="row">
      <div class="grow">
        <label for="sym">Ticker symbol</label>
        <input id="sym" placeholder="e.g. AAPL, RELIANCE.NS, VFINX" autocapitalize="characters" />
      </div>
      <div class="w-th">
        <label for="th">Drop %</label>
        <input id="th" type="number" step="0.5" min="0" placeholder="3" />
      </div>
    </div>
    <div class="row" style="margin-top:10px;">
      <div class="grow">
        <label for="nm">Name (optional)</label>
        <input id="nm" placeholder="e.g. Apple" />
      </div>
      <button id="add" class="primary">Add</button>
    </div>
    <div class="hint">
      Yahoo Finance symbols — stocks, ETFs &amp; mutual funds. NSE ends in
      <code>.NS</code>, BSE <code>.BO</code>, London <code>.L</code>; US mutual
      funds look like <code>VFINX</code>. Find yours at <code>finance.yahoo.com</code>.
    </div>
  </div>

  <h2>My watchlist</h2>
  <div class="controls">
    <input id="search" class="search" type="search" placeholder="🔍 Search…" autocomplete="off" />
    <select id="sort" title="Sort watchlist">
      <option value="ath">▼ Most below ATH</option>
      <option value="today">▼ Biggest drop today</option>
      <option value="custom">↕ Custom (drag)</option>
      <option value="name">A–Z</option>
    </select>
  </div>
  <ul id="list"><li class="empty">Loading…</li></ul>

  <!-- Firebase (push) + Supabase (data) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="firebase-config.js"></script>
  <script src="supabase-config.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");
    const setStatus = (m, c = "") => { statusEl.textContent = m || ""; statusEl.className = "status-line " + c; };

    // Never show a blank page — surface the real error on screen.
    function fatal(msg) {
      const el = $("list") || document.body;
      el.innerHTML = `<li class="empty" style="color:#fca5a5">⚠️ ${String(msg)}<br><br>
        <button class="primary" onclick="location.reload(true)">Reload</button></li>`;
    }
    window.addEventListener("error", (e) => fatal((e && e.message) || "Script error"));
    window.addEventListener("unhandledrejection", (e) => fatal((e.reason && e.reason.message) || e.reason || "Load error"));

    // A CDN library failing to load would otherwise abort everything silently.
    if (typeof firebase === "undefined" || typeof window.supabase === "undefined") {
      fatal("Couldn't load app libraries (network/CDN). Tap Reload.");
      throw new Error("libraries failed to load");
    }

    firebase.initializeApp(self.firebaseConfig);
    const messaging = firebase.messaging();
    const sb = window.supabase.createClient(self.supabaseUrl, self.supabaseAnonKey);

    // ---- Service worker (install + background push) ----
    let swReg = null;
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("firebase-messaging-sw.js")
        .then((r) => (swReg = r)).catch((e) => console.error("SW register failed", e));
    }

    // ---- Notifications: compact bell ----
    $("enable").addEventListener("click", async () => {
      try {
        const reg = swReg || await navigator.serviceWorker.register("firebase-messaging-sw.js");
        if (await Notification.requestPermission() !== "granted")
          return setStatus("Notifications blocked in browser settings.", "err");
        const token = await messaging.getToken({ vapidKey: self.vapidKey, serviceWorkerRegistration: reg });
        if (!token) return setStatus("No token — check config / VAPID key.", "err");
        const { error } = await sb.from("devices").upsert({ token, ua: navigator.userAgent });
        if (error) throw error;
        const b = $("enable"); b.textContent = "🔔 On"; b.classList.add("on");
        setStatus("This device will receive alerts.", "ok");
      } catch (e) { setStatus("Error: " + e.message, "err"); console.error(e); }
    });
    messaging.onMessage((p) => {
      const n = p.notification || {};
      new Notification(n.title || "Stock alert", { body: n.body || "", icon: "icon-192.png" });
    });

    // ---- Add form collapse ----
    $("addToggle").addEventListener("click", () => {
      const f = $("addForm"), open = f.hasAttribute("hidden");
      if (open) { f.removeAttribute("hidden"); $("addToggle").textContent = "－ Close"; $("sym").focus(); }
      else { f.setAttribute("hidden", ""); $("addToggle").textContent = "＋ Add a stock / fund"; }
    });

    // ---- Watchlist CRUD ----
    const symId = (s) => s.trim().toUpperCase().replace(/[\/#?\[\]^]/g, "_");

    $("add").addEventListener("click", async () => {
      const raw = $("sym").value.trim().toUpperCase();
      if (!raw) return;
      const th = parseFloat($("th").value);
      const id = symId(raw);
      const row = { id, symbol: raw, name: $("nm").value.trim() || raw,
                    threshold_pct: isNaN(th) ? null : th };
      const { error } = await sb.from("watchlist").upsert(row);
      if (error) return alert("Could not add: " + error.message);
      $("sym").value = ""; $("nm").value = ""; $("th").value = "";
      $("addForm").setAttribute("hidden", ""); $("addToggle").textContent = "＋ Add a stock / fund";
      load();
      // Immediately fetch details via the serverless function (best-effort;
      // the monitor also enriches on its next run if this fails / isn't deployed).
      setStatus(`Fetching ${raw}…`);
      fetch(`/api/enrich?symbol=${encodeURIComponent(raw)}&id=${encodeURIComponent(id)}`)
        .then((r) => (r.ok ? r.json() : Promise.reject(r.status)))
        .then(() => { setStatus(`${raw} added.`, "ok"); load(); })
        .catch(() => setStatus(`${raw} added — details will fill in shortly.`));
    });

    async function removeStock(id, name) {
      if (!confirm("Remove " + name + "?")) return;
      expanded.delete(id);
      await sb.from("watchlist").delete().eq("id", id);
      load();
    }
    async function saveNum(id, field, val) {
      const n = parseFloat(val);
      await sb.from("watchlist").update({ [field]: isNaN(n) ? null : n }).eq("id", id);
    }

    // ---- Rendering ----
    const expanded = new Set();
    let currentRows = [];

    // Sort: computed modes + a manual drag order (persisted per device).
    const ORDER_KEY = "wlOrder", SORT_KEY = "wlSort";
    const getSort = () => localStorage.getItem(SORT_KEY) || "ath";
    let rawRows = [];

    function applySort(rows) {
      const mode = getSort();
      const r = [...rows];
      if (mode === "ath")    // most below all-time high first (biggest drawdown)
        return r.sort((a, b) => (a.ath_pct ?? 1) - (b.ath_pct ?? 1));
      if (mode === "today")  // biggest drop today first
        return r.sort((a, b) => (a.last_pct ?? 1e9) - (b.last_pct ?? 1e9));
      if (mode === "name")
        return r.sort((a, b) => (a.name || a.symbol).localeCompare(b.name || b.symbol));
      // custom: saved drag order, then alphabetical for anything new
      let order = [];
      try { order = JSON.parse(localStorage.getItem(ORDER_KEY) || "[]"); } catch (_) {}
      const rank = (id) => { const i = order.indexOf(id); return i < 0 ? 1e9 : i; };
      return r.sort((a, b) => rank(a.id) - rank(b.id) || (a.symbol < b.symbol ? -1 : 1));
    }
    function resort() { currentRows = applySort(rawRows); renderList(currentRows); }

    function saveOrder() {
      const ids = [...$("list").children].map((li) => li.dataset.id).filter(Boolean);
      localStorage.setItem(ORDER_KEY, JSON.stringify(ids));
      localStorage.setItem(SORT_KEY, "custom");
      $("sort").value = "custom";
      resort();
    }

    let sortable = null;
    function initSortable() {
      if (sortable || typeof Sortable === "undefined") return;
      sortable = new Sortable($("list"), {
        handle: ".head", animation: 150, delay: 180, delayOnTouchOnly: true,
        ghostClass: "sortable-ghost", onEnd: saveOrder,
      });
    }

    $("search").addEventListener("input", () => renderList(currentRows));
    $("sort").value = getSort();
    $("sort").addEventListener("change", () => { localStorage.setItem(SORT_KEY, $("sort").value); resort(); });

    function fmt(n) { return Number(n).toLocaleString(undefined, { maximumFractionDigits: 2 }); }

    function chartSVG(history) {
      if (!history || history.length < 2) return '<div class="sub">Chart data builds on the next check…</div>';
      const w = 320, h = 90, pad = 5;
      const cs = history.map((p) => p.c);
      const min = Math.min(...cs), max = Math.max(...cs), range = (max - min) || 1;
      const step = (w - 2 * pad) / (history.length - 1);
      const pts = history.map((p, i) =>
        `${(pad + i * step).toFixed(1)},${(pad + (h - 2 * pad) * (1 - (p.c - min) / range)).toFixed(1)}`
      ).join(" ");
      const up = cs[cs.length - 1] >= cs[0];
      const color = up ? "var(--green)" : "var(--red)";
      return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        <polyline fill="none" stroke="${color}" stroke-width="2" points="${pts}"/></svg>`;
    }

    function athHtml(d) {
      if (d.ath_pct == null)
        return `<span class="athi muted">${d.history_date ? "high: n/a" : "high: pending…"}</span>`;
      if (d.ath_pct >= -0.05) return '<span class="athi high">🏔 At all-time high</span>';
      return `<span class="athi down">−${Math.abs(d.ath_pct).toFixed(1)}% from all-time high</span>`;
    }

    function detailHtml(d) {
      const h = d.history || [];
      const first = h.length ? h[0].t.slice(0, 4) : "";
      const last = h.length ? h[h.length - 1].t.slice(0, 4) : "";
      const cagr = d.cagr == null ? "—" : `${d.cagr >= 0 ? "+" : ""}${d.cagr.toFixed(1)}%`;
      const ath = d.ath == null ? "—" : fmt(d.ath) + (d.currency ? " " + d.currency : "");
      const yrs = (first && last) ? ` (${first}–${last})` : "";
      return `${chartSVG(h)}
        <div class="range"><span>${first}</span><span>${last}</span></div>
        <div class="stats">
          <span>CAGR${yrs} <b>${cagr}</b></span>
          <span>All-time high <b>${ath}</b></span>
        </div>
        <div class="alerts">
          <label>Heads-up drop %
            <input class="th1" type="number" step="0.5" min="0" value="${d.threshold_pct ?? ""}" placeholder="def">
          </label>
          <label><span class="strong-lbl">Strong drop %</span>
            <input class="th2" type="number" step="0.5" min="0" value="${d.threshold2_pct ?? ""}" placeholder="off">
          </label>
        </div>`;
    }

    function renderList(rows) {
      const ul = $("list");
      const q = $("search").value.trim().toLowerCase();
      // drag only in custom sort mode and when not filtering
      if (sortable) sortable.option("disabled", !!q || getSort() !== "custom");
      const list = q
        ? (rows || []).filter((d) => (d.name || "").toLowerCase().includes(q) || (d.symbol || "").toLowerCase().includes(q))
        : (rows || []);
      if (!list.length) {
        ul.innerHTML = `<li class="empty">${q ? "No matches for “" + $("search").value.trim() + "”." : "No stocks yet — tap “Add a stock / fund”."}</li>`;
        return;
      }
      ul.innerHTML = "";
      list.forEach((d) => {
        const li = document.createElement("li");
        li.dataset.id = d.id;
        const dailyPct = d.last_pct ?? null;
        const dir = d.last_price == null ? "" : (dailyPct > 0.005 ? "up" : dailyPct < -0.005 ? "down" : "flat");
        li.className = "item" + (dir ? " " + dir : "") + (expanded.has(d.id) ? " open" : "");

        const arrow = dir === "up" ? "▲" : dir === "down" ? "▼" : "•";
        const cls = dir === "up" ? "pct-up" : dir === "down" ? "pct-down" : "sub";
        const price = d.last_price == null ? '<span class="sub">waiting…</span>'
          : `<div class="px">${fmt(d.last_price)}${d.currency ? " " + d.currency : ""}</div>
             <div class="chg ${cls}">${arrow} ${dailyPct >= 0 ? "+" : ""}${(dailyPct ?? 0).toFixed(2)}% today</div>`;

        const thText = `−${d.threshold_pct ?? "def"}%`
          + (d.threshold2_pct != null ? ` · strong −${d.threshold2_pct}%` : "");

        li.innerHTML = `
          <div class="head">
            <span class="chev">▶</span>
            <div class="idcol">
              <div class="sym">${d.name || d.symbol}</div>
              <div class="sub">${d.symbol} · alert ${thText}</div>
            </div>
            <div class="pricecol">${price}</div>
          </div>
          <div class="meta">
            ${athHtml(d)}
            <span class="ctrls"><button class="del" title="Remove">✕</button></span>
          </div>
          ${expanded.has(d.id) ? `<div class="detail">${detailHtml(d)}</div>` : ""}`;

        li.querySelector(".head").addEventListener("click", () => {
          if (expanded.has(d.id)) expanded.delete(d.id); else expanded.add(d.id);
          renderList(currentRows);
        });
        li.querySelector(".del").addEventListener("click", (e) => { e.stopPropagation(); removeStock(d.id, d.name || d.symbol); });
        if (expanded.has(d.id)) {
          const t1 = li.querySelector(".th1"), t2 = li.querySelector(".th2");
          t1.addEventListener("change", () => saveNum(d.id, "threshold_pct", t1.value));
          t2.addEventListener("change", () => saveNum(d.id, "threshold2_pct", t2.value));
        }
        ul.append(li);
      });
    }

    async function load() {
      const { data, error } = await sb.from("watchlist").select("*").order("symbol");
      if (error) {
        $("list").innerHTML = `<li class="empty">Can't load watchlist: ${error.message}.<br>
          Check supabase-config.js and that you ran supabase-schema.sql.</li>`;
        return;
      }
      rawRows = data;
      initSortable();
      resort();
    }

    sb.channel("wl").on("postgres_changes",
      { event: "*", schema: "public", table: "watchlist" }, load).subscribe();
    load();
  </script>
</body>
</html>
